version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: eduvietpro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: eduvietpro_test
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d eduvietpro_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
