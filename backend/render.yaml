services:
  - type: web
    name: tumarketing-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Tú Marketing
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: hello@tumarketing.vn
      - key: EMAIL_FROM_NAME
        value: Tú Marketing
      - key: SEPAY_API_KEY
        sync: false
      - key: SEPAY_WEBHOOK_SECRET
        sync: false
      - key: BANK_ACCOUNT_NUMBER
        sync: false
      - key: BANK_NAME
        sync: false
      - key: BANK_ACCOUNT_NAME
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TZ
        value: Asia/Ho_Chi_Minh
      - key: ORDER_EXPIRE_MINUTES
        value: "30"
